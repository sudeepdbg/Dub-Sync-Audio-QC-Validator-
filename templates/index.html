<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Engine Pro v6</title>
    <style>
        :root {
            --bg-main: #f4f7fc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 24px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 24px auto;
        }

        .brand-section h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .brand-section h1 span {
            color: var(--accent-blue);
        }

        .brand-section p {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .action-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }

        .btn-blue {
            background-color: var(--accent-blue);
            color: #ffffff;
            padding: 10px 20px;
            font-size: 14px;
        }

        .btn-blue:hover { background-color: var(--accent-blue-hover); }

        .btn-gray {
            background-color: #e2e8f0;
            color: #475569;
            padding: 8px 14px;
            font-size: 12px;
        }

        .btn-gray:hover { background-color: #cbd5e1; }

        /* ── DOWNLOAD BUTTON CSS RULES ── */
        .btn-download {
            background-color: var(--accent-green);
            color: #ffffff;
            padding: 8px 14px;
            font-size: 12px;
            display: none; /* Hidden initially */
            align-items: center;
            gap: 6px;
        }

        .btn-download:hover { background-color: var(--accent-green-hover); }

        /* When this class is injected by JS, the button reveals itself */
        .btn-download.visible {
            display: inline-flex !important;
        }

        .main-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            max-width: 1152px;
            margin: 0 auto;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .file-input-wrapper {
            border: 1px dashed #cbd5e1;
            padding: 12px;
            border-radius: 6px;
            background: #f8fafc;
        }

        .vocal-opt {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        #resultsDisplay {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .raw-dump {
            background: #0f172a;
            color: #38bdf8;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="brand-section">
            <h1>Sync Engine <span>Pro</span></h1>
            <p>Temporal offset • Drift • Speed factor • Onset DNA • True Peak • Phase • Frame rates</p>
        </div>
        <div class="action-group">
            <button id="topDlBtn" class="btn-download" onclick="downloadJSONReport()">📊 Download JSON Report</button>
            <button class="btn-gray" onclick="clearCache()">Clear Cache</button>
        </div>
    </div>

    <div class="main-card">
        <form id="qcForm" onsubmit="runEngine(event)">
            <div class="upload-grid">
                <div class="field-group">
                    <label>Master Reference</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="reference" name="reference" required>
                    </div>
                </div>
                <div class="field-group">
                    <label>Dub Files</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="comparison" name="comparison[]" multiple required>
                    </div>
                </div>
                <div>
                    <button type="submit" class="btn-blue">Run QC Engine</button>
                </div>
            </div>

            <div class="vocal-opt">
                <input type="checkbox" id="vocal_logic" name="vocal_logic" checked>
                <label for="vocal_logic"><strong>Vocal DNA Filter</strong> (Runs high-efficiency HPSS processing matrix)</label>
            </div>
        </form>

        <div id="resultsDisplay" style="display: none;">
            <h3 style="margin-top:0;">QC Engine Execution Metrics</h3>
            <div id="jsonDataTarget" class="raw-dump">Processing analysis layers...</div>
        </div>
    </div>

    <script>
        let currentPayload = null;

        async function runEngine(e) {
            e.preventDefault();
            const display = document.getElementById('resultsDisplay');
            const target = document.getElementById('jsonDataTarget');
            const dlBtn = document.getElementById('topDlBtn');
            
            display.style.display = 'block';
            target.innerText = "Initializing Single-Pass Processing Pipelines...";
            dlBtn.classList.remove('visible'); 

            const formData = new FormData();
            formData.append('reference', document.getElementById('reference').files[0]);
            formData.append('vocal_logic', document.getElementById('vocal_logic').checked);
            
            const comps = document.getElementById('comparison').files;
            for (let i = 0; i < comps.length; i++) {
                formData.append('comparison[]', comps[i]);
            }

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.error) {
                    target.innerText = `Error: ${data.error}`;
                    return;
                }

                currentPayload = data;
                target.innerText = JSON.stringify(data, null, 4);

                // Reveal button on successful payload delivery
                if (data.results && data.results.length > 0) {
                    dlBtn.classList.add('visible');
                }

            } catch (err) {
                target.innerText = `Fatal Exception: ${err.message}`;
            }
        }

        function downloadJSONReport() {
            if (!currentPayload) return;
            const blob = new Blob([JSON.stringify(currentPayload, null, 4)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `qc_report_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function clearCache() {
            if (!confirm("Wipe active session workspace data structures?")) return;
            try {
                const response = await fetch('/wipe', { method: 'POST' });
                const data = await response.json();
                if (data.ok) {
                    alert("Data directory scrub complete.");
                    location.reload();
                }
            } catch(e) {
                alert("Wipe pipeline breakdown.");
            }
        }
    </script>
</body>
</html>
